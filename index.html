<!DOCTYPE html>
<html>
<head>
    <title>Simple MRZ Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>MRZ Generator</h1>

<p> Passport MRZ </p>


<div class="form">

<label>Full Name</label>
<input type="text" placeholder="DOE JOHN">


<label>Passport Number</label>
<input type="text" placeholder="A12345678">


<label>Nationality</label>
<input type="text" placeholder="USA">


<label>Date of Birth</label>
<input type="date">


<label>Expiry Date</label>
<input type="date">


<button>
Generate MRZ
</button>

</div>



<div class="passport">

<h2>MRZ OUTPUT</h2>

<div class="mrz">

P&lt;USADOE&lt;&lt;JOHN&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;<br>

A123456789USA9001011M3001017USA&lt;&lt;&lt;&lt;&lt;&lt;0

</div>

</div>


</div>


</body>
</html>
